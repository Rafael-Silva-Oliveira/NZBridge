# Release Workflow
#
# Triggered automatically when a version tag is pushed.
#
# Usage:
#   1. Bump versions (must match exactly):
#        zotero-plugin/package.json  → "version": "X.Y.Z"
#        browser-extension/manifest.json → "version": "X.Y.Z"
#
#   2. Commit and push:
#        git add zotero-plugin/package.json browser-extension/manifest.json
#        git commit -m "Release vX.Y.Z: <short description>"
#        git push origin main
#
#   3. Tag (must match package.json version exactly, with v prefix):
#        git tag vX.Y.Z
#        git push origin vX.Y.Z
#
# The workflow will:
#   - Fail fast if the tag version doesn't match zotero-plugin/package.json
#   - Build the Zotero plugin (.xpi + update.json)
#   - Zip the browser extension
#   - Create a GitHub Release with all artifacts attached
#
# Artifacts attached to each release:
#   - nz-bridge.xpi                          (Zotero plugin)
#   - update.json                             (Zotero auto-update manifest)
#   - NZBridge-browser-extension-vX.Y.Z.zip  (Chrome/Edge extension)
#   - Source code .tar.gz / .zip             (auto-attached by GitHub)

name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION=${GITHUB_REF_NAME#v}
          PKG_VERSION=$(node -p "require('./zotero-plugin/package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "ERROR: Tag version (v${TAG_VERSION}) does not match zotero-plugin/package.json version (${PKG_VERSION})"
            echo "Bump the version in zotero-plugin/package.json before tagging."
            exit 1
          fi
          echo "Version check passed: ${PKG_VERSION}"

      - name: Build Zotero plugin
        working-directory: zotero-plugin
        run: |
          npm ci
          npm run build

      - name: Zip browser extension
        run: |
          cd browser-extension
          zip -r "../NZBridge-browser-extension-${{ github.ref_name }}.zip" . \
            --exclude "*.DS_Store" --exclude "__pycache__/*"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            zotero-plugin/.scaffold/build/nz-bridge.xpi
            zotero-plugin/.scaffold/build/update.json
            NZBridge-browser-extension-${{ github.ref_name }}.zip
