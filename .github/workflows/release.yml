name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION=${GITHUB_REF_NAME#v}
          PKG_VERSION=$(node -p "require('./zotero-plugin/package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "ERROR: Tag version (v${TAG_VERSION}) does not match zotero-plugin/package.json version (${PKG_VERSION})"
            echo "Bump the version in zotero-plugin/package.json before tagging."
            exit 1
          fi
          echo "Version check passed: ${PKG_VERSION}"

      - name: Build Zotero plugin
        working-directory: zotero-plugin
        run: |
          npm ci
          npm run build

      - name: Zip browser extension
        run: |
          cd browser-extension
          zip -r "../NZBridge-browser-extension-${{ github.ref_name }}.zip" . \
            --exclude "*.DS_Store" --exclude "__pycache__/*"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            zotero-plugin/.scaffold/build/nz-bridge.xpi
            zotero-plugin/.scaffold/build/update.json
            NZBridge-browser-extension-${{ github.ref_name }}.zip
