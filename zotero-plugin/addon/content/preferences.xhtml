<linkset>
  <html:link rel="localization" href="__addonRef__-preferences.ftl" />
</linkset>
<groupbox
  onload="Zotero.__addonInstance__.hooks.onPrefsEvent('load', { window })"
>
  <label><html:h2 data-l10n-id="pref-title"></html:h2></label>
  <checkbox
    id="zotero-prefpane-__addonRef__-enable"
    preference="enable"
    data-l10n-id="pref-enable"
  />
  <separator class="thin" />
  <hbox align="center">
    <html:label
      for="zotero-prefpane-__addonRef__-defaultTags"
      data-l10n-id="pref-default-tags"
    ></html:label>
    <html:input
      type="text"
      id="zotero-prefpane-__addonRef__-defaultTags"
      preference="defaultTags"
      style="flex: 1; margin-left: 8px;"
    ></html:input>
  </hbox>
  <separator class="thin" />
  <hbox align="center">
    <html:label
      for="zotero-prefpane-__addonRef__-maxFileSize"
      data-l10n-id="pref-max-file-size"
    ></html:label>
    <html:input
      type="number"
      id="zotero-prefpane-__addonRef__-maxFileSize"
      preference="maxFileSize"
      min="1"
      max="500"
      style="width: 80px; margin-left: 8px;"
    ></html:input>
  </hbox>
</groupbox>
<vbox>
  <html:label
    data-l10n-id="pref-help"
    data-l10n-args='{"time": "__buildTime__","name": "__addonName__","version":"__buildVersion__"}'
  ></html:label>
</vbox>
